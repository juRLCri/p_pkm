name: VITE MPA Despliegue de Portal a GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL }}

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Compilar la página para distribución
        run: npm run build

      - name: Asegurar el 404 fallback
        run: cp ./dist/index.html ./dist/404.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir los compilados a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4